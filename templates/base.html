<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ANTIEGG B2B{% endblock %}</title>

  <style>
    /* ── Design Tokens ───────────────────────────────────────────────── */
    :root {
      /* Neutral */
      --bg:               #FAFAFA;
      --surface:          #FFFFFF;
      --border:           #E8E8E8;
      --border-strong:    #D4D4D4;
      --text-primary:     #111111;
      --text-secondary:   #555555;
      --text-muted:       #999999;
      --text-disabled:    #C5C5C5;

      /* Accent */
      --primary:          #2563EB;
      --primary-hover:    #1D4ED8;
      --primary-bg:       #EFF6FF;

      /* Status (시급도 마커) */
      --critical:         #DC2626;
      --attention:        #EA580C;
      --action:           #CA8A04;
      --upcoming:         #2563EB;

      /* Stage badge */
      --badge-stage-bg:   #F3F4F6;
      --badge-stage-tx:   #555555;
      --badge-closed-bg:  #111111;
      --badge-closed-tx:  #FFFFFF;

      /* Spacing — 4px grid */
      --sp-1:  4px;
      --sp-2:  8px;
      --sp-3:  12px;
      --sp-4:  16px;
      --sp-5:  20px;
      --sp-6:  24px;
      --sp-8:  32px;
      --sp-12: 48px;

      /* Radius */
      --r-sm: 4px;
      --r-md: 6px;
      --r-lg: 8px;
      --r-xl: 12px;

      /* Type */
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI',
              'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;

      /* Motion */
      --d-micro:    100ms;
      --d-fast:     150ms;
      --d-base:     200ms;
      --d-emphasis: 250ms;
      --ease-out:   cubic-bezier(0.16, 1, 0.3, 1);
      --ease-in:    cubic-bezier(0.4, 0, 1, 1);
      --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);

      /* Layout */
      --sidebar-w: 220px;
      --topbar-h:  52px;
      --focus-ring: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ── Reset & Base ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      color: var(--text-primary);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }
    button { font-family: inherit; cursor: pointer; }

    /* ── Topbar ─────────────────────────────────────────────────────── */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--topbar-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 var(--sp-6);
      gap: var(--sp-3);
      z-index: 50;
    }
    .topbar-brand {
      display: flex; align-items: center; gap: var(--sp-2);
      font-weight: 700; font-size: 14px; color: var(--text-primary);
      letter-spacing: -.01em;
    }
    .topbar-brand .logo {
      width: 18px; height: 18px; color: var(--text-primary);
    }
    .topbar-spacer { flex: 1; }
    .topbar-cmdk {
      display: inline-flex; align-items: center; gap: var(--sp-2);
      height: 32px; padding: 0 var(--sp-3);
      border-radius: var(--r-md);
      background: var(--bg);
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      border: none;
      transition: background var(--d-micro) var(--ease-out);
    }
    .topbar-cmdk:hover { background: #F3F4F6; color: var(--text-secondary); }
    .topbar-cmdk kbd {
      font-family: var(--font); font-size: 11px;
      padding: 1px 5px; border-radius: 3px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-muted);
    }
    .topbar-action {
      display: inline-flex; align-items: center; gap: var(--sp-2);
      height: 32px; padding: 0 var(--sp-3);
      border-radius: var(--r-md);
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px; font-weight: 500;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: background var(--d-micro) var(--ease-out),
                  color var(--d-micro) var(--ease-out);
    }
    .topbar-action:hover { background: #F3F4F6; color: var(--text-primary); }
    .topbar-action i { width: 14px; height: 14px; }
    .topbar-user {
      display: inline-flex; align-items: center; gap: var(--sp-1);
      color: var(--text-secondary); font-size: 13px;
      padding: 0 var(--sp-2);
      cursor: pointer;
    }

    /* ── Sidebar ────────────────────────────────────────────────────── */
    .sidebar {
      position: fixed;
      top: var(--topbar-h); left: 0; bottom: 0;
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: var(--sp-4) var(--sp-3);
      display: flex; flex-direction: column;
      gap: var(--sp-1);
    }
    .nav-item {
      position: relative;
      display: flex; align-items: center;
      gap: var(--sp-3);
      height: 40px;
      padding: 0 var(--sp-3);
      border-radius: var(--r-md);
      color: var(--text-secondary);
      font-size: 14px; font-weight: 500;
      text-decoration: none !important;
      transition: background var(--d-micro) var(--ease-out),
                  color    var(--d-micro) var(--ease-out);
    }
    .nav-item .icon { width: 18px; height: 18px; flex-shrink: 0; }
    .nav-item:hover { background: #F3F4F6; color: var(--text-primary); }
    .nav-item.active {
      background: #F3F4F6;
      color: var(--text-primary);
      font-weight: 600;
    }
    .nav-item.active::before {
      content: '';
      position: absolute;
      left: -8px; top: 8px; bottom: 8px;
      width: 3px; border-radius: 2px;
      background: var(--primary);
    }

    /* ── Layout ─────────────────────────────────────────────────────── */
    .layout {
      padding-top: var(--topbar-h);
      padding-left: var(--sidebar-w);
      min-height: 100vh;
    }
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: var(--sp-8) var(--sp-6);
    }

    /* ── Typography ─────────────────────────────────────────────────── */
    .h-page    { font-size: 20px; font-weight: 700; color: var(--text-primary); letter-spacing: -.01em; }
    .h-section { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .h-deal    { font-size: 18px; font-weight: 700; color: var(--text-primary); letter-spacing: -.01em; }
    .text-body  { font-size: 14px; color: var(--text-primary); }
    .text-meta  { font-size: 12px; color: var(--text-muted); }
    .text-muted { color: var(--text-muted); }
    .text-secondary { color: var(--text-secondary); }
    .micro      { font-size: 11px; font-weight: 600; color: var(--text-secondary); }

    /* ── Card ───────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: var(--sp-5);
    }
    .card-action {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      cursor: pointer;
      transition: border-color var(--d-micro) var(--ease-out),
                  background  var(--d-micro) var(--ease-out);
    }
    .card-action:hover { border-color: var(--border-strong); background: var(--surface); }

    /* ── Badge ──────────────────────────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center;
      height: 22px; padding: 0 var(--sp-2);
      border-radius: var(--r-sm);
      font-size: 11px; font-weight: 600;
      background: var(--badge-stage-bg);
      color: var(--badge-stage-tx);
    }
    .badge-closed { background: var(--badge-closed-bg); color: var(--badge-closed-tx); }
    .badge-count {
      background: transparent;
      color: var(--text-muted);
      padding: 0;
    }

    /* ── Status dot ─────────────────────────────────────────────────── */
    .dot {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; flex-shrink: 0;
    }
    .dot-critical  { background: var(--critical); }
    .dot-attention { background: var(--attention); }
    .dot-action    { background: var(--action); }
    .dot-upcoming  { background: var(--upcoming); }

    /* ── Button ─────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: var(--sp-2);
      height: 36px; padding: 0 var(--sp-3);
      border: none; background: none;
      border-radius: var(--r-md);
      font-family: var(--font); font-size: 14px; font-weight: 600;
      transition: background var(--d-micro) var(--ease-out),
                  border-color var(--d-micro) var(--ease-out),
                  color var(--d-micro) var(--ease-out);
    }
    .btn:focus-visible { outline: none; box-shadow: var(--focus-ring); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary {
      background: var(--primary); color: #fff;
    }
    .btn-primary:hover:not(:disabled) { background: var(--primary-hover); }
    .btn-secondary {
      background: var(--surface); color: var(--text-primary);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover:not(:disabled) { background: #F3F4F6; }
    .btn-ghost { background: transparent; color: var(--text-secondary); }
    .btn-ghost:hover:not(:disabled) { background: #F3F4F6; color: var(--text-primary); }
    .btn-danger {
      background: var(--surface); color: var(--critical);
      border: 1px solid #FCA5A5;
    }
    .btn-danger:hover:not(:disabled) { background: #FEF2F2; }

    /* ── Input ──────────────────────────────────────────────────────── */
    input[type=text], input[type=email], select, textarea {
      width: 100%;
      height: 36px;
      padding: 0 var(--sp-3);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      background: var(--surface);
      font-family: inherit; font-size: 14px;
      color: var(--text-primary);
      transition: border-color var(--d-micro) var(--ease-out),
                  box-shadow   var(--d-micro) var(--ease-out);
    }
    textarea { height: auto; min-height: 100px; padding: var(--sp-2) var(--sp-3); resize: vertical; line-height: 1.6; }
    input[type=text]:focus, input[type=email]:focus, select:focus, textarea:focus {
      outline: none; border-color: var(--primary);
      box-shadow: var(--focus-ring);
    }
    label {
      display: block;
      font-size: 12px; font-weight: 600; color: var(--text-secondary);
      margin-bottom: var(--sp-1);
    }

    /* ── Utility ────────────────────────────────────────────────────── */
    .flex { display: flex; }
    .flex-col { display: flex; flex-direction: column; }
    .gap-1 { gap: var(--sp-1); }
    .gap-2 { gap: var(--sp-2); }
    .gap-3 { gap: var(--sp-3); }
    .gap-4 { gap: var(--sp-4); }
    .gap-6 { gap: var(--sp-6); }
    .items-center { align-items: center; }
    .items-start { align-items: flex-start; }
    .justify-between { justify-content: space-between; }
    .mb-2 { margin-bottom: var(--sp-2); }
    .mb-3 { margin-bottom: var(--sp-3); }
    .mb-4 { margin-bottom: var(--sp-4); }
    .mb-5 { margin-bottom: var(--sp-5); }
    .mb-6 { margin-bottom: var(--sp-6); }
    .mb-8 { margin-bottom: var(--sp-8); }
    .mt-2 { margin-top: var(--sp-2); }
    .mt-4 { margin-top: var(--sp-4); }
    .mt-6 { margin-top: var(--sp-6); }
    .text-center { text-align: center; }

    /* ── Empty state ────────────────────────────────────────────────── */
    .empty {
      text-align: center;
      padding: var(--sp-12);
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ── Slide-over Panel ───────────────────────────────────────────── */
    .panel-backdrop {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.08);
      opacity: 0; pointer-events: none;
      transition: opacity var(--d-base) var(--ease-out);
      z-index: 90;
    }
    .panel-backdrop.open { opacity: 1; pointer-events: auto; }

    .panel {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: min(720px, calc(100vw - var(--sidebar-w)));
      background: var(--surface);
      border-left: 1px solid var(--border);
      border-radius: var(--r-xl) 0 0 var(--r-xl);
      box-shadow: 0 0 24px rgba(0, 0, 0, 0.06);
      transform: translateX(100%);
      transition: transform var(--d-emphasis) var(--ease-out);
      z-index: 100;
      overflow-y: auto;
      display: flex; flex-direction: column;
    }
    .panel.open { transform: translateX(0); }

    .panel-header {
      position: sticky; top: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--sp-3) var(--sp-5);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 1;
    }
    .panel-header button {
      background: none; border: none; padding: var(--sp-1);
      border-radius: var(--r-md);
      color: var(--text-secondary);
      cursor: pointer;
      display: inline-flex; align-items: center;
      transition: background var(--d-micro) var(--ease-out);
    }
    .panel-header button:hover { background: #F3F4F6; color: var(--text-primary); }

    .panel-body {
      padding: var(--sp-5) var(--sp-6);
      flex: 1;
    }

    .panel-divider {
      height: 1px; background: var(--border);
      margin: var(--sp-5) 0;
    }

    .section-head {
      font-size: 14px; font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--sp-2);
    }

    /* Stage trigger badge (clickable) */
    .stage-dropdown { position: relative; display: inline-block; }
    .stage-trigger {
      display: inline-flex; align-items: center; gap: var(--sp-1);
      height: 24px; padding: 0 var(--sp-2);
      border-radius: var(--r-sm);
      background: var(--badge-stage-bg);
      color: var(--badge-stage-tx);
      border: none; font-family: var(--font);
      font-size: 11px; font-weight: 600;
      cursor: pointer;
      transition: background var(--d-micro) var(--ease-out);
    }
    .stage-trigger:hover { background: #E5E7EB; }
    .stage-trigger.closed { background: var(--badge-closed-bg); color: var(--badge-closed-tx); }
    .stage-trigger.closed:hover { background: #1F2937; }

    .stage-menu {
      position: absolute; top: calc(100% + 4px); left: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      min-width: 200px;
      padding: var(--sp-1) 0;
      z-index: 200;
      transform-origin: top left;
      animation: dropdown-in 150ms var(--ease-out);
    }
    .stage-menu[hidden] { display: none; }
    .stage-menu-item {
      display: flex; align-items: center; gap: var(--sp-2);
      width: 100%; height: 32px;
      padding: 0 var(--sp-3);
      background: none; border: none;
      font-family: var(--font); font-size: 13px; font-weight: 500;
      color: var(--text-primary);
      cursor: pointer; text-align: left;
    }
    .stage-menu-item:hover { background: #F3F4F6; }
    .stage-menu-item.current { color: var(--primary); }
    .stage-menu-item .check { margin-left: auto; color: var(--primary); }
    @keyframes dropdown-in {
      from { opacity: 0; transform: scale(0.96); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* Trigger buttons (panel actions) */
    .trigger-row {
      display: flex; gap: var(--sp-2);
      margin-bottom: var(--sp-2);
    }
    .trigger-row-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--sp-2);
      margin-bottom: var(--sp-2);
    }
    .trigger-btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: var(--sp-2);
      width: 100%;
      height: 38px; padding: 0 var(--sp-3);
      border-radius: var(--r-md);
      font-family: var(--font); font-size: 13px; font-weight: 600;
      background: var(--surface); color: var(--text-primary);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: background var(--d-micro) var(--ease-out),
                  border-color var(--d-micro) var(--ease-out);
    }
    .trigger-btn:hover:not(:disabled) { background: #F3F4F6; }
    .trigger-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .trigger-btn i { width: 16px; height: 16px; flex-shrink: 0; }

    .trigger-btn--primary {
      background: var(--primary); color: #fff; border-color: var(--primary);
    }
    .trigger-btn--primary:hover:not(:disabled) {
      background: var(--primary-hover); border-color: var(--primary-hover);
    }
    .trigger-btn--done { color: #16A34A; }
    .trigger-btn--draft { color: var(--primary); }
    .trigger-btn--error {
      color: var(--critical);
      border-color: #FCA5A5;
    }
    .trigger-btn--error:hover:not(:disabled) { background: #FEF2F2; }

    .trigger-error-msg {
      font-size: 12px; color: var(--critical);
      margin-top: var(--sp-1);
      padding: 0 var(--sp-2);
    }
    .trigger-processing-hint {
      font-size: 12px; color: var(--text-muted);
      margin-top: var(--sp-1);
      padding: 0 var(--sp-2);
    }

    /* Progress shimmer */
    .progress-bar {
      height: 4px;
      border-radius: 2px;
      background: #F3F4F6;
      overflow: hidden;
      position: relative;
      margin-top: var(--sp-2);
    }
    .progress-shimmer {
      position: absolute; top: 0; bottom: 0; left: 0;
      width: 40%;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      animation: shimmer 1.5s linear infinite;
    }
    @keyframes shimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    /* Draft alert */
    .draft-alert {
      display: flex; align-items: flex-start; gap: var(--sp-3);
      padding: var(--sp-3) var(--sp-4);
      background: #FFF7ED;
      border: 1px solid #FED7AA;
      border-radius: var(--r-md);
      margin-top: var(--sp-3);
      font-size: 13px;
      color: #9A3412;
    }
    .draft-alert .dot { background: var(--attention); margin-top: 4px; flex-shrink: 0; }
    .draft-alert a { color: var(--primary); font-weight: 600; white-space: nowrap; }
    .draft-alert > div:first-of-type { flex: 1; }

    /* Collapsible (details/summary) */
    .collapsible {
      border-top: 1px solid #F3F4F6;
    }
    .collapsible summary {
      list-style: none;
      display: flex; align-items: center; gap: var(--sp-2);
      cursor: pointer;
      padding: var(--sp-3) 0;
      font-size: 14px; font-weight: 600;
      color: var(--text-primary);
    }
    .collapsible summary::-webkit-details-marker { display: none; }
    .collapsible summary::before {
      content: '';
      display: inline-block;
      width: 0; height: 0;
      border-top: 4px solid transparent;
      border-bottom: 4px solid transparent;
      border-left: 5px solid var(--text-secondary);
      transition: transform var(--d-fast) var(--ease-smooth);
    }
    .collapsible[open] summary::before {
      transform: rotate(90deg);
    }
    .collapsible summary .count {
      font-size: 12px; font-weight: 400; color: var(--text-muted);
    }
    .collapsible-body {
      padding: 0 0 var(--sp-3) var(--sp-4);
    }

    /* History rows (same company) */
    .history-list { margin-top: var(--sp-1); }
    .history-row {
      display: grid;
      grid-template-columns: 140px auto 1fr;
      gap: var(--sp-3);
      padding: var(--sp-2) 0;
      font-size: 13px;
      border-bottom: 1px solid #F8F8F8;
      align-items: baseline;
    }
    .history-row:last-child { border-bottom: none; }
    .history-row .id { font-variant-numeric: tabular-nums; color: var(--text-secondary); }

    /* Activity rows */
    .activity-row {
      display: grid; grid-template-columns: 130px 1fr; gap: var(--sp-3);
      padding: var(--sp-2) 0;
      font-size: 13px;
      align-items: baseline;
    }
    .activity-row .time { color: var(--text-muted); font-size: 12px; }

    /* Key-Value rows */
    .kv-row {
      display: grid; grid-template-columns: 100px 1fr; gap: var(--sp-3);
      padding: var(--sp-2) 0;
      font-size: 13px;
      align-items: baseline;
    }
    .kv-row .k { color: var(--text-muted); }
    .kv-row .v { color: var(--text-primary); }

    /* Trigger status indicator */
    .trigger-status {
      font-size: 12px; font-weight: 600;
    }
    .trigger-status--done    { color: #16A34A; }
    .trigger-status--draft   { color: var(--primary); }
    .trigger-status--error   { color: var(--critical); }
    .trigger-status--pending,
    .trigger-status--processing { color: #D97706; }
    .trigger-status--idle    { color: var(--text-disabled); }

    /* Toast notifications */
    .toast-container {
      position: fixed; bottom: var(--sp-6); right: var(--sp-6);
      z-index: 1000;
      display: flex; flex-direction: column; gap: var(--sp-2);
      pointer-events: none;
    }
    .toast {
      display: inline-flex; align-items: center; gap: var(--sp-3);
      max-width: 400px;
      padding: var(--sp-3) var(--sp-4);
      background: #111; color: #fff;
      border-radius: var(--r-md);
      font-size: 13px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      pointer-events: auto;
      animation: toast-in 200ms var(--ease-out);
    }
    .toast.leaving { animation: toast-out 150ms var(--ease-in) forwards; }
    .toast--success { background: #111; }
    .toast--error   { background: var(--critical); }
    .toast--info    { background: #1F2937; }
    .toast > i { flex-shrink: 0; }
    .toast .msg { flex: 1; line-height: 1.4; }
    .toast button {
      background: rgba(255, 255, 255, 0.12);
      color: #fff; border: none;
      padding: 4px 10px;
      border-radius: var(--r-sm);
      font-family: var(--font);
      font-size: 12px; font-weight: 600;
      cursor: pointer;
      transition: background var(--d-micro);
    }
    .toast button:hover { background: rgba(255, 255, 255, 0.2); }
    .toast .close-x {
      background: transparent !important;
      padding: 0 var(--sp-1) !important;
      font-size: 18px; line-height: 1;
    }
    .toast .close-x:hover { background: transparent !important; opacity: 0.7; }
    @keyframes toast-in {
      from { transform: translateX(40px); opacity: 0; }
      to   { transform: translateX(0); opacity: 1; }
    }
    @keyframes toast-out {
      to { opacity: 0; transform: translateX(20px); }
    }

    /* ── Cmd+K Search modal ─────────────────────────────────────────── */
    .cmdk-backdrop {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.35);
      opacity: 0; pointer-events: none;
      transition: opacity var(--d-base) var(--ease-out);
      z-index: 110;
    }
    .cmdk-backdrop.open { opacity: 1; pointer-events: auto; }

    .cmdk-modal {
      position: fixed;
      top: 15vh; left: 50%;
      transform: translateX(-50%) scale(0.96);
      width: min(640px, calc(100vw - 32px));
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      opacity: 0; pointer-events: none;
      transition: opacity var(--d-base) var(--ease-out),
                  transform var(--d-base) var(--ease-out);
      z-index: 120;
      overflow: hidden;
      display: flex; flex-direction: column;
      max-height: 70vh;
    }
    .cmdk-modal.open {
      opacity: 1; pointer-events: auto;
      transform: translateX(-50%) scale(1);
    }

    .cmdk-input-wrap {
      display: flex; align-items: center; gap: var(--sp-3);
      padding: var(--sp-4) var(--sp-5);
      border-bottom: 1px solid var(--border);
    }
    .cmdk-input-icon {
      width: 18px; height: 18px;
      color: var(--text-muted); flex-shrink: 0;
    }
    .cmdk-input {
      flex: 1;
      height: auto !important;
      border: none !important;
      padding: 0 !important;
      font-size: 16px;
      background: transparent;
      box-shadow: none !important;
    }
    .cmdk-input:focus {
      border: none !important;
      box-shadow: none !important;
    }
    .cmdk-input::placeholder { color: var(--text-muted); }
    .cmdk-esc {
      font-family: var(--font); font-size: 11px;
      padding: 2px 6px; border-radius: 3px;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .cmdk-results {
      flex: 1; overflow-y: auto;
      padding: var(--sp-2) 0;
    }
    .cmdk-hint, .cmdk-empty {
      padding: var(--sp-6);
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }
    .cmdk-empty strong { color: var(--text-primary); font-weight: 600; }

    .cmdk-group-head {
      display: flex; align-items: baseline; gap: var(--sp-1);
      padding: var(--sp-3) var(--sp-5) var(--sp-1);
      font-size: 11px; font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .cmdk-group-head .count {
      font-size: 11px; font-weight: 400;
      color: var(--text-muted); text-transform: none;
      letter-spacing: 0;
    }

    .cmdk-item {
      display: flex; align-items: center; gap: var(--sp-3);
      width: 100%;
      padding: var(--sp-3) var(--sp-5);
      background: none; border: none;
      font-family: var(--font);
      color: var(--text-primary);
      cursor: pointer; text-align: left;
      transition: background var(--d-micro) var(--ease-out);
    }
    .cmdk-item:hover,
    .cmdk-item.active { background: #F3F4F6; }
    .cmdk-item-body { flex: 1; min-width: 0; }
    .cmdk-item-head {
      display: flex; align-items: baseline; gap: var(--sp-2);
    }
    .cmdk-item-company {
      font-size: 14px; font-weight: 600;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .cmdk-item-deal-id {
      font-size: 12px; color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }
    .cmdk-item-meta {
      font-size: 12px; color: var(--text-secondary);
      margin-top: 2px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .cmdk-item.is-exact .cmdk-item-company { color: var(--primary); }

    /* Quote summary box */
    .quote-box {
      background: #FAFAFA;
      border-left: 3px solid var(--primary);
      padding: var(--sp-3) var(--sp-4);
      border-radius: 0 var(--r-md) var(--r-md) 0;
      font-size: 14px; line-height: 1.7;
      color: var(--text-secondary);
      white-space: pre-wrap;
    }
  </style>

  {% block head_extra %}{% endblock %}
</head>
<body>

  <header class="topbar">
    <div class="topbar-brand">
      <i data-lucide="sparkles" class="logo"></i>
      ANTIEGG <span style="color: var(--text-muted); font-weight: 500;">B2B</span>
    </div>
    <div class="topbar-spacer"></div>
    <button class="topbar-action" type="button"
            hx-post="/admin/ingest-sent?limit=10"
            hx-swap="none"
            title="Gmail 보낸편지함에서 ANTIEGG 회신을 가져와 few-shot 사례로 추가 (백그라운드)">
      <i data-lucide="refresh-cw"></i>
      <span>사례 갱신</span>
    </button>
    <button class="topbar-cmdk" type="button" onclick="openSearch()">
      <i data-lucide="search" style="width:14px; height:14px;"></i>
      <span>검색</span>
      <kbd>⌘K</kbd>
    </button>
    <div class="topbar-user">
      류진 <i data-lucide="chevron-down" style="width:14px; height:14px;"></i>
    </div>
  </header>

  <aside class="sidebar">
    <a href="/" class="nav-item {% if request.url.path in ('/', '/inbox') %}active{% endif %}">
      <i data-lucide="inbox" class="icon"></i>
      <span>인박스</span>
    </a>
    <a href="/pipeline" class="nav-item {% if request.url.path == '/pipeline' %}active{% endif %}">
      <i data-lucide="layout-grid" class="icon"></i>
      <span>파이프라인</span>
    </a>
    <a href="/companies" class="nav-item {% if request.url.path.startswith('/companies') %}active{% endif %}">
      <i data-lucide="building-2" class="icon"></i>
      <span>회사</span>
    </a>
  </aside>

  <div class="layout">
    <main class="main">
      {% block content %}{% endblock %}
    </main>
  </div>

  <!-- Slide-over Deal Panel -->
  <div id="panel-backdrop" class="panel-backdrop" onclick="closePanel()"></div>
  <aside id="panel" class="panel" role="dialog" aria-modal="true" aria-hidden="true">
    <div id="panel-content"></div>
  </aside>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <!-- Cmd+K Search modal -->
  <div id="cmdk-backdrop" class="cmdk-backdrop" onclick="closeSearch()"></div>
  <div id="cmdk-modal" class="cmdk-modal" role="dialog" aria-modal="true"
       aria-hidden="true" aria-label="검색">
    <div class="cmdk-input-wrap">
      <i data-lucide="search" class="cmdk-input-icon"></i>
      <input id="cmdk-input"
             type="text"
             class="cmdk-input"
             placeholder="회사·담당자·이메일·딜 ID 검색"
             autocomplete="off"
             name="q"
             hx-get="/search"
             hx-trigger="keyup changed delay:150ms"
             hx-target="#cmdk-results"
             hx-swap="innerHTML">
      <kbd class="cmdk-esc">esc</kbd>
    </div>
    <div id="cmdk-results" class="cmdk-results"></div>
  </div>

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>

  <!-- Lucide icons (CDN) -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>
    function refreshIcons() { if (window.lucide) lucide.createIcons(); }
    refreshIcons();

    // /?open=<deal_id> 로 진입 시 슬라이드 패널 자동 오픈 (deep link)
    (function autoOpenFromQuery() {
      const m = new URLSearchParams(window.location.search).get('open');
      if (!m) return;
      const fire = () => {
        if (!window.htmx) { setTimeout(fire, 50); return; }
        htmx.ajax('GET', '/deals/' + encodeURIComponent(m) + '/panel', {
          target: '#panel-content', swap: 'innerHTML',
        });
        // 쿼리 파라미터 제거 (뒤로가기 루프 방지)
        const url = new URL(window.location.href);
        url.searchParams.delete('open');
        window.history.replaceState({}, '', url.toString());
      };
      window.addEventListener('DOMContentLoaded', fire);
    })();

    function openPanel() {
      document.getElementById('panel-backdrop').classList.add('open');
      const panel = document.getElementById('panel');
      panel.classList.add('open');
      panel.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }
    function closePanel() {
      const backdrop = document.getElementById('panel-backdrop');
      const panel = document.getElementById('panel');
      backdrop.classList.remove('open');
      panel.classList.remove('open');
      panel.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      setTimeout(() => {
        document.getElementById('panel-content').innerHTML = '';
      }, 300);
    }
    document.addEventListener('htmx:afterSwap', (e) => {
      if (e.target && e.target.id === 'panel-content') {
        // 검색 모달이 열려 있으면 먼저 닫기 (Cmd+K → 결과 클릭 흐름)
        if (document.getElementById('cmdk-modal').classList.contains('open')) {
          closeSearch();
        }
        openPanel();
        refreshIcons();
      }
    });

    // ── Cmd+K Search ─────────────────────────────────────────────────
    function openSearch() {
      document.getElementById('cmdk-backdrop').classList.add('open');
      const modal = document.getElementById('cmdk-modal');
      modal.classList.add('open');
      modal.setAttribute('aria-hidden', 'false');
      const input = document.getElementById('cmdk-input');
      input.value = '';
      input.focus();
      // 초기 힌트 렌더
      if (window.htmx) {
        htmx.ajax('GET', '/search', {
          target: '#cmdk-results', swap: 'innerHTML',
        });
      }
    }
    function closeSearch() {
      const backdrop = document.getElementById('cmdk-backdrop');
      const modal    = document.getElementById('cmdk-modal');
      backdrop.classList.remove('open');
      modal.classList.remove('open');
      modal.setAttribute('aria-hidden', 'true');
      cmdkActive = -1;
    }

    let cmdkActive = -1;
    function cmdkItems() {
      return Array.from(document.querySelectorAll('#cmdk-results .cmdk-item'));
    }
    function setCmdkActive(i) {
      const items = cmdkItems();
      if (!items.length) { cmdkActive = -1; return; }
      cmdkActive = (i + items.length) % items.length;
      items.forEach((el, idx) => el.classList.toggle('active', idx === cmdkActive));
      items[cmdkActive].scrollIntoView({ block: 'nearest' });
    }

    // 전역 키보드: Cmd/Ctrl+K, ESC, ↑↓, Enter
    document.addEventListener('keydown', (e) => {
      // Cmd+K / Ctrl+K로 열기 (어디서든)
      if ((e.metaKey || e.ctrlKey) && (e.key === 'k' || e.key === 'K')) {
        e.preventDefault();
        openSearch();
        return;
      }
      const cmdkOpen  = document.getElementById('cmdk-modal').classList.contains('open');
      const panelOpen = document.getElementById('panel').classList.contains('open');
      if (e.key === 'Escape') {
        if (cmdkOpen)  { closeSearch();  return; }
        if (panelOpen) { closePanel();   return; }
      }
      if (!cmdkOpen) return;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        setCmdkActive(cmdkActive + 1);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        setCmdkActive(cmdkActive - 1);
      } else if (e.key === 'Enter') {
        const items = cmdkItems();
        if (!items.length) return;
        e.preventDefault();
        if (cmdkActive < 0) setCmdkActive(0);
        items[cmdkActive].click();
      }
    });

    // 결과 갱신 시 active 초기화 + 아이콘 리프레시
    document.body.addEventListener('htmx:afterSwap', (e) => {
      if (e.target && e.target.id === 'cmdk-results') {
        cmdkActive = -1;
        refreshIcons();
      }
    });

    // Stage dropdown toggle
    function toggleStageDropdown(e) {
      e.stopPropagation();
      const menu = document.querySelector('#stage-dropdown .stage-menu');
      if (!menu) return;
      if (menu.hasAttribute('hidden')) menu.removeAttribute('hidden');
      else menu.setAttribute('hidden', '');
    }
    // 외부 클릭 시 dropdown 닫기
    document.addEventListener('click', (e) => {
      const dropdown = document.getElementById('stage-dropdown');
      if (!dropdown) return;
      if (!dropdown.contains(e.target)) {
        const menu = dropdown.querySelector('.stage-menu');
        if (menu) menu.setAttribute('hidden', '');
      }
    });

    // ── Toast ─────────────────────────────────────────────────────────
    function showToast(message, type, undo) {
      const container = document.getElementById('toast-container');
      // 동시 표시 1개만 (Step 5c)
      container.innerHTML = '';

      const t = document.createElement('div');
      t.className = 'toast toast--' + (type || 'info');

      const iconName = type === 'error' ? 'x-circle'
                     : type === 'success' ? 'check'
                     : 'info';

      let undoBtnHtml = '';
      if (undo && undo.deal_id && undo.stage) {
        undoBtnHtml = '<button type="button" data-undo-deal="' + undo.deal_id +
                      '" data-undo-stage="' + undo.stage + '">되돌리기</button>';
      }

      t.innerHTML =
        '<i data-lucide="' + iconName + '" style="width:14px;height:14px;"></i>' +
        '<span class="msg">' + message + '</span>' +
        undoBtnHtml +
        '<button type="button" class="close-x" aria-label="닫기">×</button>';

      container.appendChild(t);
      refreshIcons();

      // 닫기 핸들러
      t.querySelector('.close-x').addEventListener('click', () => dismissToast(t));

      // Undo 핸들러
      const undoBtn = t.querySelector('[data-undo-deal]');
      if (undoBtn) {
        undoBtn.addEventListener('click', () => {
          const dealId = undoBtn.getAttribute('data-undo-deal');
          const stage = undoBtn.getAttribute('data-undo-stage');
          if (window.htmx) {
            htmx.ajax('POST', '/deals/' + dealId + '/stage', {
              target: '#panel-content',
              swap:   'innerHTML',
              values: { stage: stage },
            });
          }
          dismissToast(t);
        });
      }

      // 자동 사라짐: success 3초, error 5초, undo 포함 8초
      const ttl = undo ? 8000 : (type === 'error' ? 5000 : 3000);
      setTimeout(() => dismissToast(t), ttl);
    }
    function dismissToast(el) {
      if (!el || !el.parentNode) return;
      el.classList.add('leaving');
      setTimeout(() => el.remove(), 200);
    }
    // HTMX HX-Trigger 이벤트 수신
    document.body.addEventListener('toast', (e) => {
      const d = e.detail || {};
      showToast(d.message || '', d.type || 'info', d.undo);
    });
  </script>

  {% block body_extra %}{% endblock %}
</body>
</html>
